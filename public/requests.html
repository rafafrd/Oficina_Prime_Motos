<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oficina Prime Motos | Ordens</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body data-page="requests">
    <div class="app-shell">
      <aside id="sidebar" class="sidebar"></aside>
      <div class="shell-main">
        <header id="topbar" class="topbar"></header>
        <main class="page-content">
          <section class="page-intro">
            <span class="eyebrow">Ordens e solicitações</span>
            <h1>Fluxo de atendimento</h1>
            <p>Abra solicitações, acompanhe status, histórico, orçamento e execução.</p>
          </section>

          <section class="grid requests-grid">
            <div class="stack-lg">
              <article id="createRequestPanel" class="panel"></article>
              <article class="panel">
                <div class="section-head">
                  <h2>Ordens disponíveis</h2>
                  <span id="ordersCounter" class="counter-chip"></span>
                </div>
                <div id="ordersList"></div>
              </article>
            </div>

            <article id="orderDetail" class="panel detail-panel"></article>
          </section>
        </main>
      </div>
    </div>

    <script type="module" src="/js/requests.js"></script>
  </body>
</html>
